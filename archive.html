    body {
      margin: 0;
      padding: 40px;

      font-family: Helvetica, Arial, sans-serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      clip-path: inset(0 0 5px 0);
    }

    a {
      color: black;
      text-decoration: none;
      display: block;
    }

    .back {
    position: fixed;
    top: 20px;
    left: 30px;
    font-size: 14px;
    color: black;
    text-decoration: none;
    backdrop-filter: blur(4px);
    letter-spacing: 0.5px;
  
    border: 1px solid black;
    border-radius: 999px;
    padding: 10px 16px;

    opacity: 0.7;
    transition: all 0.2s ease;
    }

    .back:hover {
    opacity: 1;
    background: rgba(0,0,0,0.05);
    }

    .active {
    outline: 2px solid black;
    opacity: 0.7;
    transform: scale(1.02);
    outline-offset: 4px;
    }

    img {
    transition: opacity 0.2s ease;
    }

    img:hover {
    opacity: 0.7;
    }

    .item {
  position: relative;
}

.date {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 14px;
  letter-spacing: 1px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.item:hover .date,
.item:hover img + .date {
  opacity: 1;
}
  </style>
</head>

  "2025-06-14_499.jpg",
  "2025-06-16_500.jpg"
];

const grid = document.getElementById("grid");

const params = new URLSearchParams(window.location.search);
const from = parseInt(params.get("from")) || 0;

let activeElement = null;

images.forEach((filename, index) => {
    const link = document.createElement("a");
    link.href = "index.html?image=" + (index + 1) + "&from=" + from;
    
    const wrapper = document.createElement("div");
    wrapper.classList.add("item");
    
    const img = document.createElement("img");
    img.src = "images2/" + filename;
    img.loading = "lazy";
    
    // 👉 достаём дату из имени файла
    const dateStr = filename.split("_")[0]; // 2025-01-12
    
    // 👉 форматируем в 01-01-2025
    const parts = dateStr.split("-");
    const formattedDate = parts[2] + "-" + parts[1] + "-" + parts[0];
    
    const date = document.createElement("div");
    date.classList.add("date");
    date.innerText = formattedDate;
    
    // собираем
    wrapper.appendChild(img);
    wrapper.appendChild(date);
    link.appendChild(wrapper);
    grid.appendChild(link);
    
    // активный элемент
    if (index === from) {
      img.classList.add("active");
      activeElement = img;
    }
    });

// кнопка назад
document.getElementById("backLink").href = "index.html?image=" + (from + 1);

// автоскролл
if (activeElement) {
  setTimeout(() => {
    activeElement.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 100);
}

</script>

</body>
</html>
