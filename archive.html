<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Archive</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      background: white;
      font-family: Helvetica, Arial, sans-serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }

    a {
      color: black;
      text-decoration: none;
      display: block;
    }

    .back {
    position: fixed;
    top: 20px;
    left: 30px;
    font-size: 14px;
    color: black;
    text-decoration: none;
    backdrop-filter: blur(4px);
    letter-spacing: 0.5px;
  
    border: 1px solid black;
    border-radius: 999px;
    padding: 10px 16px;

    opacity: 0.7;
    transition: all 0.2s ease;
    }

    .back:hover {
    opacity: 1;
    background: rgba(0,0,0,0.05);
    }

    .active {
    outline: 2px solid black;
    opacity: 0.7;
    transform: scale(1.02);
    outline-offset: 4px;
    }

    img {
    transition: opacity 0.2s ease;
    }

    img:hover {
    opacity: 0.7;
    }
  </style>
</head>

<body>

<a href="#" id="backLink" class="back">← назад</a>

<div class="grid" id="grid"></div>

<script>
  const totalImages = 100;

const grid = document.getElementById("grid");

const params = new URLSearchParams(window.location.search);
const from = parseInt(params.get("from")) || 0;

let activeElement = null;

// создаём сетку
for (let i = 1; i <= totalImages; i++) {
  const link = document.createElement("a");
  link.href = "index.html?image=" + i + "&from=" + from;

  const img = document.createElement("img");
  img.src = "images/" + i + ".jpg";
  img.loading = "lazy";

  // если это текущее изображение
  if (i - 1 === from) {
    img.classList.add("active");
    activeElement = img;
  }

  link.appendChild(img);
  grid.appendChild(link);
}

// кнопка назад
document.getElementById("backLink").href = "index.html?image=" + (from + 1);

// автоскролл
if (activeElement) {
  setTimeout(() => {
    activeElement.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 100);
}

</script>

</body>
</html>
