<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: white;
      overflow: hidden;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      color: white;
      text-decoration: none;
      padding: 20px;
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    .archive {
      position: fixed;
      top: 60px;
      right: 30px;
      font-size: 14px;
      color: white;
      text-decoration: none;
    }

    a {
      opacity: 0.6;
    }

    a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

<img id="img">

<!-- стрелки -->
<a href="#" id="prev" class="nav prev">←</a>
<a href="#" id="next" class="nav next">→</a>

<!-- архив -->
<a href="archive.html" class="archive">архив</a>

<script>
  const images = ["1.jpg","2.jpg","3.jpg"];

  const params = new URLSearchParams(window.location.search);
  let offset = parseInt(params.get("day")) || 0;

  const day = Math.floor(Date.now() / (1000*60*60*24)) + offset;
  const index = ((day % images.length) + images.length) % images.length;

  document.getElementById("img").src = images[index];

  document.getElementById("prev").href = "?day=" + (offset - 1);
  document.getElementById("next").href = "?day=" + (offset + 1);

  document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") {
    offset++;
  } else if (e.key === "ArrowLeft") {
    offset--;
  } else {
    return;
  }

  const newUrl = "?day=" + offset;
  window.location.href = newUrl;
  });
</script>

</body>
</html>
