<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>one more day</title>

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
    }

    .viewer {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nav, .archive {
      position: absolute;
      color: white;
      text-decoration: none;
      border: 1px solid white;
      border-radius: 999px;
      padding: 10px 16px;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: all 0.2s ease;
    }

    .nav:hover, .archive:hover {
      opacity: 1;
      background: rgba(255,255,255,0.1);
    }

    .prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .archive {
      top: 40px;
      right: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    #month {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 32px;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0.5;
      transition: opacity 1s ease;
    }
  </style>
</head>

<body>

<div class="viewer">
  <img id="img">
  <div id="month"></div>
  
  <a href="#" id="prev" class="nav prev">←</a>
  <a href="#" id="next" class="nav next">→</a>
  <a href="#" id="archiveLink" class="archive">archive</a>
</div>

<script>
  const totalImages = 200;

const images = [];
for (let i = 1; i <= totalImages; i++) {
  images.push("images/" + i + ".jpg");
}

const params = new URLSearchParams(window.location.search);

// текущий индекс
let index = parseInt(params.get("image")) - 1;

// если не задан → показываем "сегодня"
if (isNaN(index)) {
  const day = Math.floor(Date.now() / (1000*60*60*24));
  index = day % images.length;
}

// откуда пришли (для кнопки назад)
const from = params.get("from");

// обновление изображения
function findImagePosition(index) {
  let count = 0;

  for (let d = 0; d < days.length; d++) {
    for (let i = 0; i < days[d].images.length; i++) {
      if (count === index) {
        return {
          dayIndex: d,
          imageIndex: i
        };
      }
      count++;
    }
  }

  return { dayIndex: 0, imageIndex: 0 };
}

function getGlobalIndex(dayIndex, imageIndex) {
  let count = 0;

  for (let d = 0; d < dayIndex; d++) {
    count += days[d].images.length;
  }

  return count + imageIndex;
}

function updateImage() {
  const pos = findImagePosition(index);

  const day = days[pos.dayIndex];
  const imageNumber = day.images[pos.imageIndex];

  document.getElementById("img").src = "images/" + imageNumber + ".jpg";
  document.getElementById("month").innerText = day.label;
}

// старт
updateImage();

// навигация
function goNext() {
  index++;
  updateImage();
}
  
function goPrev() {
  index--;
  updateImage();
}

// кнопки
document.getElementById("next").onclick = (e) => {
  e.preventDefault();
  goNext();
};

document.getElementById("prev").onclick = (e) => {
  e.preventDefault();
  goPrev();
};

// клавиатура
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") goNext();
  if (e.key === "ArrowLeft") goPrev();
});

// клик по изображению
document.getElementById("img").onclick = goNext;

// архив
document.getElementById("archiveLink").onclick = (e) => {
  e.preventDefault();
  window.location.href = "archive.html?from=" + index;
};

// защита
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

  const days = [
  {
    label: "January 12",
    images: [1, 2, 3]
  },
  {
    label: "January 13",
    images: [4]
  },
  {
    label: "January 18",
    images: [5]
  },
  {
    label: "January 19",
    images: [6]
  },
    {
    label: "January 20",
    images: [7]
  },
    {
    label: "January 21",
    images: [8,9,10,11,12,13,14,15]
  },
    {
    label: "January 22",
    images: [16]
  },
    {
    label: "January 23",
    images: [17,18,19]
  },
    {
    label: "January 24",
    images: [20, 21,22]
  },
    {
    label: "January 25",
    images: [23,24]
  },
    {
    label: "January 26",
    images: [25,26]
  },
    {
    label: "January 27",
    images: [27,28]
  },
    {
    label: "January 28",
    images: [29,30]
  },
    {
    label: "January 29",
    images: [31,32]
  },
    {
    label: "January 30",
    images: [33,34,35]
  },
    {
    label: "January 31",
    images: [36,37,38,39]
  }
    
];
</script>

</body>
</html>
