<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      color: white;
      text-decoration: none;
      padding: 20px;
      z-index: 10;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    .archive {
      position: fixed;
      top: 60px;
      right: 30px;
      font-size: 14px;
      color: white;
      text-decoration: none;
      z-index: 10;
    }

    a {
      opacity: 0.6;
    }

    a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

<img id="img">

<a href="#" id="prev" class="nav prev">←</a>
<a href="#" id="next" class="nav next">→</a>
<a href="archive.html" class="archive">архив</a>

<script>
  const totalImages = 10; // ← укажи сколько у тебя файлов

  const images = [];
  for (let i = 1; i <= totalImages; i++) {
  images.push(i + ".jpg");
  }

  const params = new URLSearchParams(window.location.search);
  let offset = parseInt(params.get("day")) || 0;

  function updateImage() {
    const day = Math.floor(Date.now() / (1000*60*60*24)) + offset;
    const index = ((day % images.length) + images.length) % images.length;

    document.getElementById("img").src = images[index];

    // обновляем URL без перезагрузки
    history.replaceState({}, "", "?day=" + offset);

    // обновляем ссылки (на всякий случай)
    document.getElementById("prev").href = "?day=" + (offset - 1);
    document.getElementById("next").href = "?day=" + (offset + 1);
  }

  updateImage();

  // кнопки
  document.getElementById("prev").onclick = (e) => {
    e.preventDefault();
    offset--;
    updateImage();
  };

  document.getElementById("next").onclick = (e) => {
    e.preventDefault();
    offset++;
    updateImage();
  };

  // клавиатура
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      offset++;
      updateImage();
    }
    if (e.key === "ArrowLeft") {
      offset--;
      updateImage();
    }
  });

  // клик по изображению → вперёд
  document.getElementById("img").onclick = () => {
    offset++;
    updateImage();
  };
</script>

</body>
</html>
