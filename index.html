<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
    }

    .viewer {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nav, .archive {
      position: absolute;
      color: white;
      text-decoration: none;
      border: 1px solid white;
      border-radius: 999px;
      padding: 10px 16px;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: all 0.2s ease;
    }

    .nav:hover, .archive:hover {
      opacity: 1;
      background: rgba(255,255,255,0.1);
    }

    .prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .archive {
      top: 40px;
      right: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    #month {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 32px;
    letter-spacing: 4px;
    pointer-events: none;
    opacity: 0.5;
      transition: opacity 1s ease;
    }
  </style>
</head>

<body>

<div class="viewer">
  <img id="img">
  <div id="month"></div>
  
  <a href="#" id="prev" class="nav prev">←</a>
  <a href="#" id="next" class="nav next">→</a>
  <a href="#" id="archiveLink" class="archive">архив</a>
</div>

<script>
  const totalImages = 100;

const images = [];
for (let i = 1; i <= totalImages; i++) {
  images.push("images/" + i + ".jpg");
}

const params = new URLSearchParams(window.location.search);

// текущий индекс
let index = parseInt(params.get("image")) - 1;

// если не задан → показываем "сегодня"
if (isNaN(index)) {
  const day = Math.floor(Date.now() / (1000*60*60*24));
  index = day % images.length;
}

// откуда пришли (для кнопки назад)
const from = params.get("from");

// обновление изображения
function updateImage() {
  index = ((index % images.length) + images.length) % images.length;
  document.getElementById("img").src = images[index];
  document.getElementById("month").innerText = getMonth(index);
}

// старт
updateImage();

// навигация
function goNext() {
  index++;
  updateImage();
}

function goPrev() {
  index--;
  updateImage();
}

// кнопки
document.getElementById("next").onclick = (e) => {
  e.preventDefault();
  goNext();
};

document.getElementById("prev").onclick = (e) => {
  e.preventDefault();
  goPrev();
};

// клавиатура
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") goNext();
  if (e.key === "ArrowLeft") goPrev();
});

// клик по изображению
document.getElementById("img").onclick = goNext;

// архив
document.getElementById("archiveLink").onclick = (e) => {
  e.preventDefault();
  window.location.href = "archive.html?from=" + index;
};

// защита
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

  function getMonth(index) {
  const i = index + 1; // потому что у тебя картинки с 1

  if (i >= 1 && i <= 39) return "January";
  if (i >= 40 && i <= 100) return "February";

  return "";
}
</script>

</body>
</html>
