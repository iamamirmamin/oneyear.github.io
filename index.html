<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    img {
      max-width: 80vw;
      max-height: 80vh;
      object-fit: contain;
    }

    .controls {
      margin-top: 20px;
      font-size: 14px;
    }

    a {
      text-decoration: none;
      color: black;
      margin: 0 10px;
    }

    a:hover {
      opacity: 0.5;
    }

    .archive-link {
      position: fixed;
      top: 20px;
      right: 30px;
      font-size: 14px;
      color: black;
      text-decoration: none;
    }

    .archive-link:hover {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<!-- кнопка архив -->
<a href="archive.html" class="archive-link">архив</a>

<div class="container">
  <img id="img">

  <div class="controls">
    <a href="#" id="prev">← вчера</a>
    <a href="#" id="next">завтра →</a>
    <span id="date"></span>
  </div>
</div>

<script>
  const images = ["1.jpg","2.jpg","3.jpg"];

  const params = new URLSearchParams(window.location.search);
  let offset = parseInt(params.get("day")) || 0;

  const today = new Date();
  today.setHours(0,0,0,0); // важно!

  const currentDate = new Date(today);
  currentDate.setDate(currentDate.getDate() + offset);

  const start = new Date(2026, 0, 1);
  start.setHours(0,0,0,0);

  const diffDays = Math.floor((currentDate - start) / (1000 * 60 * 60 * 24));
  const index = ((diffDays % images.length) + images.length) % images.length;

  document.getElementById("img").src = images[index];

  // дата
  document.getElementById("date").innerText = currentDate.toDateString();

  // ссылки
  document.getElementById("prev").href = "?day=" + (offset - 1);
  document.getElementById("next").href = "?day=" + (offset + 1);
</script>

</body>
</html>
