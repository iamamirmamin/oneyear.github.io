<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .viewer {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nav, .archive {
      position: absolute;
      color: white;
      text-decoration: none;
      border: 1px solid white;
      border-radius: 999px;
      padding: 10px 16px;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: all 0.2s ease;
    }

    .nav:hover, .archive:hover {
      opacity: 1;
      background: rgba(255,255,255,0.1);
    }

    .prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .archive {
      top: 40px;
      right: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="viewer">
  <img id="img">

  <a href="#" id="prev" class="nav prev">←</a>
  <a href="#" id="next" class="nav next">→</a>
  <a href="archive.html" class="archive">архив</a>
</div>

<script>
  const totalImages = 16;

  const images = [];
  for (let i = 1; i <= totalImages; i++) {
    images.push("images/" + i + ".jpg");
  }

  const params = new URLSearchParams(window.location.search);
  let offset = parseInt(params.get("day")) || 0;

  function updateImage() {
    const day = Math.floor(Date.now() / (1000*60*60*24)) + offset;
    const index = ((day % images.length) + images.length) % images.length;

    document.getElementById("img").src = images[index];

    history.replaceState({}, "", "?day=" + offset);
  }

  updateImage();

  document.getElementById("prev").onclick = (e) => {
    e.preventDefault();
    offset--;
    updateImage();
  };

  document.getElementById("next").onclick = (e) => {
    e.preventDefault();
    offset++;
    updateImage();
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      offset++;
      updateImage();
    }
    if (e.key === "ArrowLeft") {
      offset--;
      updateImage();
    }
  });

  document.getElementById("img").onclick = () => {
    offset++;
    updateImage();
  };
  
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("dragstart", e => e.preventDefault());
  
</script>

</body>
</html>
