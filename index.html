      backdrop-filter: blur(4px);

      transition: all 0.2s ease;
    }

    .nav:hover, .archive:hover {

      background: rgba(255,255,255,0.1);
    }

    .prev {

      top: 50%;

    }

    .next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);

    }

    .archive {
      top: 40px;
      right: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    #month {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 32px;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0.5;

// обновление изображения
function updateImage() {
  index = ((index % images.length) + images.length) % images.length;
  const filename = images[index];

document.getElementById("img").src = "images/" + filename;

const dateStr = getDateFromFilename(filename);
const label = formatDate(dateStr);

document.getElementById("month").innerText = label;

}

// старт
updateImage();

// навигация
function goNext() {
  index++;
  updateImage();
}

function goPrev() {
  index--;
  updateImage();
}

// кнопки
document.getElementById("next").onclick = (e) => {
  e.preventDefault();
  goNext();
};

document.getElementById("prev").onclick = (e) => {
  e.preventDefault();
  goPrev();
};

// клавиатура
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") goNext();
  if (e.key === "ArrowLeft") goPrev();
});

// клик по изображению
document.getElementById("img").onclick = goNext;

// архив

  function getMonth(index) {
  const i = index + 1; // потому что у тебя картинки с 1

 
  if (i >= 1 && i <= 39) return "January";
  if (i >= 40 && i <= 155) return "February";
  if (i >= 156 && i <= 200) return "March";

  return "";
}
  function getDateFromFilename(filename) {
  // убираем расширение
  const name = filename.replace(".jpg", "");

  // разбиваем по "_"
  const datePart = name.split("_")[0];

  return datePart; // "2025-01-12"
}
    function formatDate(dateStr) {
  const date = new Date(dateStr);

  if (isNaN(date)) return ""; // защита от ошибки

  const month = date.toLocaleString("en", { month: "long" });
  const day = date.getDate();

  return (month + " " + day).toUpperCase();
}
