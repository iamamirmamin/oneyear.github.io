    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Helvetica, Arial, sans-serif;
    }

    .viewer {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nav, .archive {
      position: absolute;
      color: white;
      text-decoration: none;
      border: 1px solid white;
      border-radius: 999px;
      padding: 10px 16px;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: all 0.2s ease;
    }

    .nav:hover, .archive:hover {
      opacity: 1;
      background: rgba(255,255,255,0.1);
    }

    .prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .archive {
      top: 40px;
      right: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    #month {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 32px;
    letter-spacing: 2px;
    pointer-events: none;
    opacity: 0.5;
      transition: opacity 1s ease;
    }

        .about {

      right: 10px;
    }
    
    #aboutBox {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.4);
    }
    
    .about-content {
      background: white;
      color: black;
      opacity: 0.5;
      padding: 30px;
      max-width: 400px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>

const params = new URLSearchParams(window.location.search);

// текущий индекс
let indexParam = parseInt(params.get("image"));
let index = isNaN(indexParam) ? null : indexParam - 1;
  
// если не задан → показываем "сегодня"
if (index === null) {
  const day = Math.floor(Date.now() / (1000*60*60*24));
  index = day % images.length;
}

// откуда пришли (для кнопки назад)
const from = params.get("from");

// обновление изображения
function updateImage() {
  if (isNaN(index)) index = 0;

  index = ((index % images.length) + images.length) % images.length;

  const filename = images[index];

  document.getElementById("img").src = "images2/" + filename;

  const dateStr = getDateFromFilename(filename);
  const label = formatDate(dateStr);

  document.getElementById("month").innerText = label || "";
}

// старт
updateImage();

// навигация
function goNext() {
  index++;
  updateImage();
}

function goPrev() {
  index--;
  updateImage();
}

// кнопки
document.getElementById("next").onclick = (e) => {
  e.preventDefault();
  goNext();
};

document.getElementById("prev").onclick = (e) => {
  e.preventDefault();
  goPrev();
};

// клавиатура
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") goNext();
  if (e.key === "ArrowLeft") goPrev();
});

// клик по изображению
document.getElementById("img").onclick = goNext;

// архив
document.getElementById("archiveLink").onclick = (e) => {
  e.preventDefault();
  window.location.href = "archive.html?from=" + index;
};

// защита
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

  function getMonth(index) {
  const i = index + 1; // потому что у тебя картинки с 1

 
  if (i >= 1 && i <= 39) return "January";
  if (i >= 40 && i <= 155) return "February";
  if (i >= 156 && i <= 200) return "March";

  return "";
}
  function getDateFromFilename(filename) {
  // убираем расширение
  const name = filename.replace(".jpg", "");

  // разбиваем по "_"
  const datePart = name.split("_")[0];

  return datePart; // "2025-01-12"
}
    function formatDate(dateStr) {
  const date = new Date(dateStr);

  if (isNaN(date)) return ""; // защита от ошибки

  const month = date.toLocaleString("en", { month: "long" });
  const day = date.getDate();

  return (month + " " + day);
}

  const aboutLink = document.getElementById("aboutLink");
const aboutBox = document.getElementById("aboutBox");

aboutLink.onclick = (e) => {
  e.preventDefault();
  aboutBox.style.display = "flex";
};

// закрытие по клику вне текста
aboutBox.onclick = () => {
  aboutBox.style.display = "none";
};
