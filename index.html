<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily</title>

  <style>
    body {
      margin: 0;
      background: white;
      overflow: hidden;
      cursor: none;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      transition: opacity 0.5s ease;
    }

    .ui {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .ui.visible {
      opacity: 1;
      pointer-events: auto;
      cursor: default;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      color: black;
      text-decoration: none;
      padding: 20px;
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    .archive {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 14px;
    }

    a {
      color: black;
      text-decoration: none;
      opacity: 0.3;
    }

    a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

<img id="img">

<div class="ui" id="ui">
  <a href="#" id="prev" class="nav prev">←</a>
  <a href="#" id="next" class="nav next">→</a>
  <a href="archive.html" class="archive">архив</a>
</div>

<script>
  const images = ["1.jpg","2.jpg","3.jpg"];

  const params = new URLSearchParams(window.location.search);
  let offset = parseInt(params.get("day")) || 0;

  const img = document.getElementById("img");

  function updateImage() {
    const day = Math.floor(Date.now() / (1000*60*60*24)) + offset;
    const index = ((day % images.length) + images.length) % images.length;

    img.style.opacity = 0;

    setTimeout(() => {
      img.src = images[index];
      img.style.opacity = 1;
    }, 200);

    document.getElementById("prev").href = "?day=" + (offset - 1);
    document.getElementById("next").href = "?day=" + (offset + 1);
  }

  updateImage();

  // клик = следующий день
  img.addEventListener("click", () => {
    offset++;
    history.pushState({}, "", "?day=" + offset);
    updateImage();
  });

  // клавиши
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      offset++;
    } else if (e.key === "ArrowLeft") {
      offset--;
    } else return;

    history.pushState({}, "", "?day=" + offset);
    updateImage();
  });

  // UI появляется при движении мыши
  const ui = document.getElementById("ui");
  let timeout;

  document.addEventListener("mousemove", () => {
    ui.classList.add("visible");

    clearTimeout(timeout);
    timeout = setTimeout(() => {
      ui.classList.remove("visible");
    }, 1500);
  });
</script>

</body>
</html>
